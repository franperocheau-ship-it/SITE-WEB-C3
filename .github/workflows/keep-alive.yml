name: Supabase Keep-Alive

on:
  schedule:
    # Toutes les 72 h (3 jours) — large marge sous la limite de 7 jours Supabase
    - cron: "0 8 */3 * *"
  workflow_dispatch: # lancement manuel possible depuis l'onglet Actions

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Upsert keep_alive row
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request POST \
            --url "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            --header "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            --header "Content-Type: application/json" \
            --header "Prefer: resolution=merge-duplicates" \
            --data '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✓ Supabase ping réussi"
          else
            echo "✗ Ping échoué (HTTP $HTTP_STATUS)"
            exit 1
          fi
